<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>解说字幕播放器</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --ok: #3fb950;
      --warn: #d29922;
      --red: #f85149;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow:hidden; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* 顶栏 */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .topbar h1 { font-size: 1rem; font-weight: 600; margin-right: auto; }
    .topbar .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted); transition: background 0.3s;
    }
    .dot.ok { background: var(--ok); }
    .dot.err { background: var(--red); }
    .topbar label { font-size: 0.78rem; color: var(--muted); }
    .topbar input {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 3px 8px; border-radius: 4px;
      font-size: 0.8rem; width: 160px;
    }
    .topbar button {
      padding: 3px 10px; border-radius: 4px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); cursor: pointer; font-size: 0.8rem;
    }
    .topbar button:hover { background: rgba(255,255,255,0.06); }
    .topbar .status { font-size: 0.78rem; color: var(--muted); }
    .topbar .audio-st { font-size: 0.78rem; color: var(--ok); }

    /* 三栏主体 */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 280px 1fr 300px;
      min-height: 0;
    }

    /* 左栏：ZMQ 事件 */
    .panel-left {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      padding: 8px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
    }
    .panel-header .count { color: var(--accent); font-variant-numeric: tabular-nums; }
    .event-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .event-item {
      padding: 4px 12px;
      font-size: 0.78rem;
      border-bottom: 1px solid var(--border);
      line-height: 1.4;
    }
    .event-item:last-child { border-bottom: none; }
    .event-time { color: var(--accent); font-variant-numeric: tabular-nums; margin-right: 6px; }
    .event-player { font-weight: 600; margin-right: 4px; }
    .event-action { color: var(--text); }
    .event-conf { color: var(--muted); margin-left: 4px; font-size: 0.72rem; }
    .event-score { color: var(--warn); margin-left: 6px; font-size: 0.72rem; }
    .batch-divider {
      padding: 3px 12px;
      background: rgba(88,166,255,0.08);
      font-size: 0.72rem;
      color: var(--accent);
      font-weight: 600;
    }

    /* 中栏：视频 + 字幕 */
    .panel-center {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #000;
    }
    .video-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }
    video {
      display: block;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .subtitle-overlay {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 80%;
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }
    .subtitle-text {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(0,0,0,0.78);
      border-radius: 6px;
      font-size: 1.15rem;
      line-height: 1.5;
      color: #fff;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
      transition: opacity 0.25s ease;
    }
    .subtitle-text.hidden { opacity: 0; }

    /* 右栏：日志 */
    .panel-right {
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .log-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .log-item {
      padding: 3px 12px;
      font-size: 0.75rem;
      line-height: 1.45;
      border-bottom: 1px solid var(--border);
      font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
    }
    .log-item:last-child { border-bottom: none; }
    .log-tag {
      display: inline-block;
      padding: 0 5px;
      border-radius: 3px;
      font-size: 0.68rem;
      font-weight: 600;
      margin-right: 5px;
      vertical-align: middle;
    }
    .log-tag.LLM { background: rgba(88,166,255,0.15); color: var(--accent); }
    .log-tag.TTS { background: rgba(63,185,80,0.15); color: var(--ok); }
    .log-tag.解说 { background: rgba(210,153,34,0.15); color: var(--warn); }
    .log-tag.SYS { background: rgba(139,148,158,0.15); color: var(--muted); }
    .log-msg { color: var(--text); }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar">
  <h1>解说字幕播放器</h1>
  <div class="dot" id="statusDot"></div>
  <span class="status" id="statusText">未连接</span>
  <label>WS:</label>
  <input id="wsUrl" type="text" value="ws://127.0.0.1:8765" />
  <button id="btnConnect" onclick="connectWS()">连接</button>
  <button id="btnDisconnect" onclick="disconnectWS()" disabled>断开</button>
  <span class="audio-st" id="audioStatus"></span>
</div>

<!-- 三栏主体 -->
<div class="main">

  <!-- 左栏：ZMQ 事件 -->
  <div class="panel-left">
    <div class="panel-header">
      <span>ZMQ 事件</span>
      <span class="count" id="eventCount">0</span>
    </div>
    <div class="event-list" id="eventList"></div>
  </div>

  <!-- 中栏：视频 + 字幕 -->
  <div class="panel-center">
    <div class="video-wrap">
      <video id="video" src="/static/test.mp4" controls muted></video>
      <div class="subtitle-overlay">
        <span id="subtitleText" class="subtitle-text hidden"></span>
      </div>
    </div>
  </div>

  <!-- 右栏：日志 -->
  <div class="panel-right">
    <div class="panel-header">日志</div>
    <div class="log-list" id="logList"></div>
  </div>

</div>

<script>
  const video = document.getElementById('video');
  const subtitleEl = document.getElementById('subtitleText');
  const eventList = document.getElementById('eventList');
  const eventCountEl = document.getElementById('eventCount');
  const logList = document.getElementById('logList');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const audioStatus = document.getElementById('audioStatus');
  const btnConnect = document.getElementById('btnConnect');
  const btnDisconnect = document.getElementById('btnDisconnect');
  const wsUrlInput = document.getElementById('wsUrl');

  let ws = null;
  let subtitleTimer = null;
  let totalEvents = 0;

  // 音频播放队列
  const audioQueue = [];
  let isPlaying = false;

  // 用户点击后重试音频播放
  document.addEventListener('click', () => {
    if (!isPlaying && audioQueue.length > 0) playNextAudio();
  });

  function setStatus(connected) {
    statusDot.className = 'dot ' + (connected ? 'ok' : 'err');
    statusText.textContent = connected ? '已连接' : '未连接';
    btnConnect.disabled = connected;
    btnDisconnect.disabled = !connected;
  }

  function showSubtitle(text, durationSec) {
    subtitleEl.textContent = text;
    subtitleEl.classList.remove('hidden');
    if (subtitleTimer) clearTimeout(subtitleTimer);
    const ms = Math.max((durationSec || 4) * 1000, 1500);
    subtitleTimer = setTimeout(() => subtitleEl.classList.add('hidden'), ms);
  }

  // ---- 左栏：ZMQ 事件 ----
  function addEvents(data) {
    const batchIdx = data.batch_index;
    // 批次分隔
    const divider = document.createElement('div');
    divider.className = 'batch-divider';
    divider.textContent = `批次 ${batchIdx}（${data.count} 条）`;
    eventList.appendChild(divider);

    for (const ev of data.events) {
      const item = document.createElement('div');
      item.className = 'event-item';
      let html = `<span class="event-time">${ev.time || ''}</span>`;
      html += `<span class="event-player" style="color:${ev.player_label === '红方' ? 'var(--red)' : 'var(--accent)'}">${ev.player_label || ''}</span>`;
      html += `<span class="event-action">${ev.action_label || ''}</span>`;
      if (ev.confidence) html += `<span class="event-conf">${(ev.confidence * 100).toFixed(0)}%</span>`;
      // 得分
      const score = ev.score;
      if (score && (score.red || score.blue)) {
        const parts = [];
        if (score.red) parts.push(`红${score.red}`);
        if (score.blue) parts.push(`蓝${score.blue}`);
        html += `<span class="event-score">${parts.join(' ')}</span>`;
      }
      item.innerHTML = html;
      eventList.appendChild(item);
    }
    totalEvents += data.count;
    eventCountEl.textContent = totalEvents;
    eventList.scrollTop = eventList.scrollHeight;
  }

  // ---- 右栏：日志 ----
  function addLog(tag, message) {
    const item = document.createElement('div');
    item.className = 'log-item';
    const tagClass = ['LLM', 'TTS', '解说'].includes(tag) ? tag : 'SYS';
    item.innerHTML = `<span class="log-tag ${tagClass}">${tag}</span><span class="log-msg">${escHtml(message)}</span>`;
    logList.appendChild(item);
    // 最多保留 200 条
    while (logList.children.length > 200) logList.removeChild(logList.firstChild);
    logList.scrollTop = logList.scrollHeight;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ---- 音频队列播放器 ----
  function playNextAudio() {
    if (isPlaying || audioQueue.length === 0) return;
    isPlaying = true;
    const { url, text, batchIndex, duration } = audioQueue.shift();
    audioStatus.textContent = `▶ ${batchIndex}`;
    const fullUrl = url.startsWith('http') ? url : `http://${location.hostname}:${location.port}${url}`;
    const audio = new Audio(fullUrl);
    audio.onplay = () => {
      showSubtitle(text || '', duration || 4);
      addLog('播放', `▶ 批次 ${batchIndex}: ${text || ''}`);
    };
    audio.onended = () => {
      subtitleEl.classList.add('hidden');
      isPlaying = false;
      audioStatus.textContent = '';
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'audio_done', batch_index: batchIndex }));
      }
      playNextAudio();
    };
    audio.onerror = () => {
      subtitleEl.classList.add('hidden');
      isPlaying = false;
      audioStatus.textContent = '';
      playNextAudio();
    };
    audio.play().catch(e => {
      audioQueue.unshift({ url, text, batchIndex, duration });
      isPlaying = false;
      audioStatus.textContent = '⚠ 点击页面启用音频';
    });
  }

  function enqueueAudio(data) {
    audioQueue.push(data);
    playNextAudio();
  }

  // ---- WebSocket ----
  function connectWS() {
    if (ws) ws.close();
    const url = wsUrlInput.value.trim();
    if (!url) return;
    ws = new WebSocket(url);

    ws.onopen = () => {
      setStatus(true);
      addLog('SYS', 'WebSocket 已连接');
      if (video.paused) video.play().catch(() => {});
    };

    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        switch (data.type) {
          case 'events':
            addEvents(data);
            break;
          case 'audio':
            enqueueAudio(data);
            break;
          case 'subtitle':
            showSubtitle(data.text, data.duration);
            break;
          case 'log':
            addLog(data.tag || 'SYS', data.message || '');
            break;
        }
      } catch (e) {
        if (event.data && typeof event.data === 'string') {
          addLog('SYS', event.data);
        }
      }
    };

    ws.onclose = () => { setStatus(false); addLog('SYS', 'WebSocket 已断开'); };
    ws.onerror = () => { setStatus(false); addLog('SYS', 'WebSocket 连接错误'); };
  }

  function disconnectWS() {
    if (ws) { ws.close(); ws = null; }
    setStatus(false);
  }

  // 自动连接
  (function autoConnect() {
    const host = location.hostname || '127.0.0.1';
    wsUrlInput.value = `ws://${host}:8765`;
    setTimeout(connectWS, 500);
  })();

  video.addEventListener('canplay', () => video.play().catch(() => {}));
</script>

</body>
</html>
